<div class="login-page">

    <!-- Left panel: branding con fondo tecnológico -->
  <aside class="brand-panel">
    <div class="brand-image-cover"></div>
    <div class="brand-overlay"></div>
    
    <div class="brand-content">
      <div class="brand-logo">
        <span class="logo-icon">TCH</span>
        <span class="logo-text">Tech Flow</span>
      </div>
      <h1 class="brand-headline">Gestión inteligente<br>de tu negocio</h1>
      <p class="brand-sub">Productos · Pedidos · Pagos · Envíos<br>todo desde un solo lugar.</p>

    </div>
  </aside>


  <!-- Right panel: form -->
  <main class="form-panel">
    <div class="form-container">

      <div class="form-header">
        <h2>Iniciar sesión</h2>
        <p>Ingresa tus credenciales para continuar</p>
      </div>

      <form class="login-form" (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>

        <div class="field-group">
          <label for="email">Correo electrónico</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M2 8l10 6 10-6"/>
            </svg>
            <input
              id="email"
              type="email"
              name="email"
              [(ngModel)]="email"
              placeholder="usuario@gtech.com"
              autocomplete="email"
              [disabled]="loading"
            />
          </div>
        </div>

        <div class="field-group">
          <label for="password">
            Contraseña
          </label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              id="password"
              [type]="showPass ? 'text' : 'password'"
              name="password"
              [(ngModel)]="password"
              placeholder="••••••••"
              autocomplete="current-password"
              [disabled]="loading"
            />
            <button type="button" class="toggle-pass" (click)="showPass = !showPass" [attr.aria-label]="showPass ? 'Ocultar contraseña' : 'Mostrar contraseña'">
              <svg *ngIf="!showPass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Error message -->
        <div class="error-banner" *ngIf="errorMsg" role="alert">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errorMsg }}
        </div>

        <button type="submit" class="btn-primary" [class.loading]="loading" [disabled]="loading">
          <span *ngIf="!loading">Entrar al sistema</span>
          <span *ngIf="loading" class="spinner-row">
            <span class="spinner"></span> Verificando...
          </span>
        </button>

      </form>

      <div class="form-footer">
        <span>¿No tienes cuenta?</span>
        <a routerLink="/register">Regístrate aquí</a>
      </div>

    </div>
  </main>

</div>
