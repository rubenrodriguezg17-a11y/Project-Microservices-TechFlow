<div class="login-page">

  <aside class="brand-panel">
    <div class="brand-image-cover"></div>
    <div class="brand-overlay"></div>
    
    <div class="brand-content">
      <div class="brand-logo">
        <span class="logo-icon">TCH</span>
        <span class="logo-text">Tech Flow</span>
      </div>
      <h1 class="brand-headline">Gestión inteligente<br>de tu negocio</h1>
      <p class="brand-sub">Productos · Pedidos · Pagos · Envíos<br>todo desde un solo lugar.</p>
    </div>
  </aside>

  <main class="form-panel">
    <div class="form-container">

      <div class="form-header">
        <h2>Crear Cuenta</h2>
        <p>Regístrate en la plataforma GTech</p>
      </div>

      <form class="login-form" (ngSubmit)="onSubmit()" #registerForm="ngForm" novalidate>

        <div class="field-group">
          <label for="name">Nombre Completo *</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              id="name"
              type="text"
              name="name"
              [(ngModel)]="payload.name"
              placeholder="Tu nombre completo"
              [disabled]="loading"
              required
            />
          </div>
        </div>

        <div class="field-group">
          <label for="email">Correo electrónico *</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M2 8l10 6 10-6"/>
            </svg>
            <input
              id="email"
              type="email"
              name="email"
              [(ngModel)]="payload.email"
              placeholder="usuario@gtech.com"
              autocomplete="email"
              [disabled]="loading"
              required
            />
          </div>
        </div>

        <div class="field-group">
          <label for="telefono">Teléfono</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            <input
              id="telefono"
              type="tel"
              name="telefono"
              [(ngModel)]="payload.telefono"
              placeholder="+51 999 999 999"
              [disabled]="loading"
            />
          </div>
        </div>

        <div class="field-group">
          <label for="direccionEnvio">Dirección de Envío</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <input
              id="direccionEnvio"
              type="text"
              name="direccionEnvio"
              [(ngModel)]="payload.direccionEnvio"
              placeholder="Av. Principal 123"
              [disabled]="loading"
            />
          </div>
        </div>

        <div class="field-group">
          <label for="password">Contraseña *</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              id="password"
              [type]="showPass ? 'text' : 'password'"
              name="password"
              [(ngModel)]="payload.password"
              placeholder="••••••••"
              autocomplete="new-password"
              [disabled]="loading"
              required
            />
            <button type="button" class="toggle-pass" (click)="showPass = !showPass" [attr.aria-label]="showPass ? 'Ocultar contraseña' : 'Mostrar contraseña'">
              <svg *ngIf="!showPass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="error-banner" *ngIf="errorMsg" role="alert">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errorMsg }}
        </div>

        <button type="submit" class="btn-primary" [class.loading]="loading" [disabled]="loading">
          <span *ngIf="!loading">Registrarme</span>
          <span *ngIf="loading" class="spinner-row">
            <span class="spinner"></span> Procesando...
          </span>
        </button>

      </form>

      <div class="form-footer">
        <span>¿Ya tienes una cuenta?</span>
        <a routerLink="/login">Inicia sesión aquí</a>
      </div>

    </div>
  </main>

</div>
