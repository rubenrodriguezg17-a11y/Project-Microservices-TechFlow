<div class="dashboard-container">
  
  <header class="dashboard-header">
    <h1 class="dashboard-title">GTech Dashboard</h1>
    <button (click)="logout()" class="btn-logout">
      Cerrar sesión
    </button>
  </header>

  <main class="dashboard-grid">
    
    <a routerLink="/productos" class="card-link">
      <div class="card card-productos">
        <span class="card-icon">📦</span>
        <span class="card-text">Productos</span>
      </div>
    </a>

    <a routerLink="/pedidos" class="card-link">
      <div class="card card-pedidos">
        <span class="card-icon">🛒</span>
        <span class="card-text">Pedidos</span>
      </div>
    </a>

    <a routerLink="/pagos" class="card-link">
      <div class="card card-pagos">
        <span class="card-icon">💳</span>
        <span class="card-text">Pagos</span>
      </div>
    </a>

    <a routerLink="/inventario" class="card-link">
      <div class="card card-inventario">
        <span class="card-icon">🏪</span>
        <span class="card-text">Inventario</span>
      </div>
    </a>

    <a routerLink="/envios" class="card-link">
      <div class="card card-envios">
        <span class="card-icon">🚚</span>
        <span class="card-text">Envíos</span>
      </div>
    </a>

    <a routerLink="/proveedores" class="card-link">
      <div class="card card-proveedores">
        <span class="card-icon">🏭</span>
        <span class="card-text">Proveedores</span>
      </div>
    </a>

  </main>
</div>
